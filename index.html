<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chat App</title>
    <!-- Link to your external CSS file -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <h2>Live Chat Web App</h2>
    <div id="chat-box"></div>

    <div id="controls">
        <input type="text" id="username" placeholder="Name" value="User1">
        <input type="text" id="text" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

</body>
</html>
